kind = "web"
previewPath = "/"
title = "Listen & Fix"
version = "1.0.0"
id = "artifacts/listen-fix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25409

[services.development]
run = "pnpm --filter @workspace/listen-fix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/listen-fix", "run", "build" ]
publicDir = "artifacts/listen-fix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25409"
BASE_PATH = "/"
